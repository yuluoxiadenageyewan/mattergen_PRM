# global setting
expname: test
results_dir: exp_res
device: cuda

# local data paths (set to null to fallback to HuggingFace download)
reference_path: mattergen/data-release/alex-mp/reference_MP2020correction.gz
potential_load_path: MatterSim-v1.0.0-5M.pth

# RL
rl_epoch: 120

# sampling
sample_cfg:
  num_batches: 4  # increased from 1 for composition-filtered sampling
  max_num: 32  # increased from eval_size for more candidates
  filter:
    _target_: pipeline.filters.opt_filter.OptFilter
    metrics:
      - validity
      - novel
      - unique
      - stable
    device: ${device}
    silent: True
    reference_path: ${reference_path}
    potential_load_path: ${potential_load_path}
  # composition constraint filter (override per experiment)
  # comp_filter:
  #   required_elements: ["Li"]
  #   excluded_elements: ["Sb"]

# rewards and finetune
# maximum number of samples to score per RL loop
eval_size: 16

hydra:
  run:
    dir: ${results_dir}/${expname}
    # dir: ${results_dir}/${expname}-${now:%Y-%m-%d_%H-%M-%S}

defaults:
  - pipeline: mat_invent
  - model: mattergen
  - reward: hhi
  - logger: wandb
