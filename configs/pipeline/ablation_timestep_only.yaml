_target_: pipeline.mat_invent.MatInvent

# global
rl_epoch: ${rl_epoch}
device: ${device}

# saving
save_dir: ./
save_freq: 100

# sampling
sample_cfg: ${sample_cfg}
topk_ratio: 0.5

# experience replay (no IS weights)
replay: True
replay_args:
  buffer_size: 100
  sample_size: 10
  reward_cutoff: 0.1
  priority_beta: 0.0

# diversity filter
div_filter: True
df_args:
  tol: 3
  buff: 6

# finetune — official + timestep sampling only
finetune_cfg:
  batch_size: ${eval_size}
  accum_steps: 50
  epochs: 3
  sigma: 0.025
  # ENABLED: timestep sampling
  num_sampled_timesteps: 50
  # NO EMA
  ema_decay: 0.0
  # NO adaptive KL
  target_kl: 999
  sigma_lr: 0.0
  # NO residual RL
  residual_alpha_init: 1.0
  residual_warmup_steps: 1
